services:
  analysis-frontend:
    image: 675045716724.dkr.ecr.ap-south-1.amazonaws.com/analysis-frontend:latest
    container_name: analysis-frontend
    restart: always
    expose:
      - "80"
    networks:
      - dentacrm-net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'

networks:
  dentacrm-net:
    external: true
